<article class="event-card">
  <div class="event-card__image-wrap">
    <img 
      [src]="event.imageUrl || 'https://via.placeholder.com/400x250'" 
      [alt]="event.title" 
      loading="lazy" 
    />
  </div>

  <div class="event-card__body">
    <h3 class="event-card__title">{{ event.title }}</h3>
    <p class="event-card__desc">{{ event.description }}</p>

    <div class="event-card__meta">
      @if (event.address.city) {
        <span class="event-card__meta-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          {{ event.address.city }}
        </span>
      }
      @if (event.startsAt) {
        <span class="event-card__meta-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          {{ formatDate(event.startsAt) }}
        </span>
      }
      <span class="event-card__meta-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        {{ event.enrolledCount || 0 }}/{{ event.capacity }} participantes
      </span>
    </div>

    <div class="event-card__actions">
      <button class="btn btn--primary btn--sm">Participar</button>
      <button class="btn btn--outline btn--sm">Ver Detalhes</button>
    </div>
  </div>
</article>
