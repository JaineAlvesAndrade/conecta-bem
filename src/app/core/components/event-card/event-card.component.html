<!-- event-card.component.html (atualizado) -->

<article class="event-card">
  <div class="event-card__image-wrap">
    <img 
      [src]="getImageSrc(event)" 
      [alt]="event.title" 
      loading="lazy" 
    />
    @if (isEventUrgent()) {
      <div class="event-card__urgent">Falta pouco</div>
    }
  </div>

  <div class="event-card__body">
    <div class="event-card__header">
      <div class="event-card__title-wrapper">
        <h3 class="event-card__title">{{ event.title }}</h3>
        <span class="event-card__category-badge">{{ getCategoryLabel(event.category) }}</span>
      </div>
    </div>
    
    <p class="event-card__desc">{{ getShortDescription() }}</p>

    <div class="event-card__info">
      <div class="event-card__meta">
        <div class="event-card__meta-item">
          <mat-icon>location_on</mat-icon>
          <span>{{ getLocationText() }}</span>
        </div>
        <div class="event-card__meta-item">
          <mat-icon>event</mat-icon>
          <span>{{ formatDate(event.startsAt) }}</span>
        </div>
        <div class="event-card__meta-item">
          <mat-icon>schedule</mat-icon>
          <span>{{ getDurationText() }}</span>
        </div>
        <div class="event-card__meta-item">
          <mat-icon>people</mat-icon>
          <span>{{ getEnrolledText() }}</span>
        </div>
      </div>
    </div>

    <div class="event-card__actions">
      <button class="btn btn--primary btn--sm">Participar</button>
      <button class="btn btn--outline btn--sm" [routerLink]="['/eventos', event.id]">Ver Detalhes</button>
      @if (canEdit) {
        <button class="btn btn--outline btn--sm" (click)="onEditClick()">Editar</button>
      }
    </div>
  </div>
</article>
