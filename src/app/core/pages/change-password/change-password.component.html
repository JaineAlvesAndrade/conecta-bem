<div class="auth-container">
  <div class="auth-card">

    <!-- SUCCESS STATE -->
    <ng-container *ngIf="state === 'success'; else formView">
      <header>
        <img src="/assets/logo.png" alt="ConectaBem" class="logo">
        <h2>Senha alterada!</h2>
        <p>Sua senha foi atualizada com sucesso.</p>
      </header>
      <button class="btn-primary" (click)="goToLogin()">Voltar para o login</button>
    </ng-container>

    <!-- FORM STATE -->
    <ng-template #formView>
      <header>
        <img src="/assets/logo.png" alt="ConectaBem" class="logo">
        <h2>Alterar senha</h2>
        <p>Informe seu e-mail, senha atual e escolha uma nova.</p>
        <div class="error" *ngIf="state === 'error'">
          {{ errorMessage }}
        </div>
      </header>

      <form (submit)="onSubmit()">

        <!-- Email -->
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" [(ngModel)]="email" name="email" required>
        </div>

        <!-- Current password -->
        <div class="form-group password-group">
          <label>Senha atual</label>
          <div class="password-field">
            <input
              [type]="showCurrent ? 'text' : 'password'"
              [(ngModel)]="currentPassword"
              name="currentPassword"
              required>
            <button type="button" class="eye" (click)="showCurrent = !showCurrent"
              aria-label="Alternar visibilidade da senha atual">
              <mat-icon>{{ showCurrent ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
        </div>

        <!-- New password -->
        <div class="form-group password-group">
          <label>Nova senha</label>
          <div class="password-field" [class.match]="passwordMatch" [class.mismatch]="passwordMismatch">
            <input
              [type]="showNew ? 'text' : 'password'"
              [(ngModel)]="newPassword"
              name="newPassword"
              required>
            <button type="button" class="eye" (click)="showNew = !showNew"
              aria-label="Alternar visibilidade da nova senha">
              <mat-icon>{{ showNew ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
        </div>

        <!-- Confirm new password -->
        <div class="form-group password-group">
          <label>
            Confirmar nova senha
          </label>
          <div class="password-field" [class.match]="passwordMatch" [class.mismatch]="passwordMismatch">
            <input
              [type]="showConfirm ? 'text' : 'password'"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              required>
            <button type="button" class="eye" (click)="showConfirm = !showConfirm"
              aria-label="Alternar visibilidade da confirmação de senha">
              <mat-icon>{{ showConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
          <span class="match-badge match-badge--ok" *ngIf="passwordMatch">
              <mat-icon>check_circle</mat-icon> Senhas iguais
            </span>
            <span class="match-badge match-badge--err" *ngIf="passwordMismatch">
              <mat-icon>cancel</mat-icon> Senhas diferentes
            </span>
        </div>

        <button
          type="submit"
          class="btn-primary"
          [disabled]="state === 'loading' || passwordMismatch || !email || !currentPassword || !newPassword || !confirmPassword">
          <span *ngIf="state !== 'loading'">Alterar senha</span>
          <span *ngIf="state === 'loading'">Aguarde...</span>
        </button>

      </form>

      <footer>
        <a (click)="goToLogin()">Voltar para o login</a>
      </footer>
    </ng-template>

  </div>
</div>
